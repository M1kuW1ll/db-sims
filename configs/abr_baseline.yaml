name: abr_baseline

dataset:
  type: gcp_full
  source_regions:
    - us-east1
    - europe-west1
    - asia-northeast1
    - asia-south1
    - us-west1
  lambda_rate: 5.0
  mu_val: -2.0
  sigma_val: 2.0

simulation:
  n_builders: 5
  n_slots: 10000
  delta: 4.0
  n_runs: 1

policy:
  type: ABR
  improvement_threshold_pct: 0.0
  utility_eval_time_steps: 400
  abr_max_updates: 10000
